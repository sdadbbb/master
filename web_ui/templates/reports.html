<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试报告列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header a {
            color: #667eea;
            text-decoration: none;
            font-size: 16px;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .report-list {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .report-item {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        .report-item:last-child {
            border-bottom: none;
        }

        .report-item:hover {
            background: #f7fafc;
            transform: translateX(10px);
        }

        .report-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .report-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-email {
            background: #ed8936;
            color: white;
        }

        .btn-email:hover {
            background: #dd6b20;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(237, 137, 54, 0.4);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .empty {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            padding: 20px;
            gap: 10px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
        }

        .pagination-info {
            color: #666;
            font-size: 14px;
            margin: 0 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> 测试报告列表</h1>
            <p style="margin-top: 10px;">
                <a href="/">← 返回首页</a>
            </p>
        </div>

        <div class="report-list" id="reportList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <div id="emailModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border-radius:10px; width:400px; max-width:90%;">
            <h3 style="margin-bottom:20px;">📧 发送邮件</h3>
            <p style="margin-bottom:10px; color:#666;" id="emailReportName"></p>
            <label style="display:block; margin-bottom:5px; font-weight:bold;">收件人邮箱：</label>
            <textarea id="emailRecipients" rows="3" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; margin-bottom:15px;" placeholder="多个邮箱用逗号分隔，例如：test1@example.com, test2@example.com"></textarea>
            <div style="text-align:right;">
                <button onclick="closeEmailModal()" class="btn" style="background:#e0e0e0; color:#333;">取消</button>
                <button onclick="confirmSendEmail()" class="btn btn-email" style="margin-left:10px;">发送</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const perPage = 10;

        function loadReports(page = 1) {
            fetch(`/api/reports?page=${page}&per_page=${perPage}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        renderReports(data.data);
                        renderPagination(data.pagination);
                    } else {
                        document.getElementById('reportList').innerHTML =
                            `<div class="empty">❌ ${data.message}</div>`;
                    }
                })
                .catch(error => {
                    console.error('加载报告失败:', error);
                    document.getElementById('reportList').innerHTML =
                        '<div class="empty">❌ 加载失败，请刷新重试</div>';
                });
        }

        function renderReports(reports) {
            const container = document.getElementById('reportList');

            if (reports.length === 0) {
                container.innerHTML = '<div class="empty">暂无测试报告</div>';
                return;
            }

            let html = '';
            reports.forEach(report => {
                html += `
                    <div class="report-item">
                        <div class="report-name">📄 ${report.filename}</div>
                        <div class="report-info">
                            文件大小：${formatSize(report.size)} |
                            创建时间：${report.created_time}
                        </div>
                        <a href="/view_report?file=${report.filename}"
                           class="btn btn-primary"
                           target="_blank">
                            👁️ 查看报告
                        </a>
                        <button onclick="openEmailModal('${report.filename}')"
                                class="btn btn-email"
                                style="margin-left:10px;">
                            📧 发送邮件
                        </button>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderPagination(pagination) {
            const container = document.getElementById('reportList');

            if (!pagination || pagination.total === 0) {
                return;
            }

            let paginationHtml = `
                <div class="pagination">
                    <button onclick="loadReports(1)" ${!pagination.has_prev ? 'disabled' : ''}>
                        ⏮ 首页
                    </button>
                    <button onclick="loadReports(${pagination.page - 1})" ${!pagination.has_prev ? 'disabled' : ''}>
                        ◀ 上一页
                    </button>
                    <span class="pagination-info">
                        第 ${pagination.page} / ${pagination.total_pages} 页，共 ${pagination.total} 条
                    </span>
                    <button onclick="loadReports(${pagination.page + 1})" ${!pagination.has_next ? 'disabled' : ''}>
                        下一页 ▶
                    </button>
                    <button onclick="loadReports(${pagination.total_pages})" ${!pagination.has_next ? 'disabled' : ''}>
                        末页 ⏭
                    </button>
                </div>
            `;

            container.innerHTML += paginationHtml;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function openEmailModal(filename) {
            currentEmailReport = filename;
            document.getElementById('emailReportName').textContent = '报告：' + filename;
            document.getElementById('emailModal').style.display = 'block';
        }

        function closeEmailModal() {
            document.getElementById('emailModal').style.display = 'none';
            document.getElementById('emailRecipients').value = '';
            currentEmailReport = '';
        }

        function confirmSendEmail() {
            const recipients = document.getElementById('emailRecipients').value.trim();

            if (!recipients) {
                alert('请输入收件人邮箱');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '发送中...';

            fetch('/api/send_email_report', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    filename: currentEmailReport,
                    recipients: recipients
                })
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.textContent = '发送';

                if (data.success) {
                    alert('✅ ' + data.message);
                    closeEmailModal();
                } else {
                    alert(' ' + data.message);
                }
            })
            .catch(error => {
                btn.disabled = false;
                btn.textContent = '发送';
                console.error('发送邮件失败:', error);
                alert('❌ 发送邮件失败，请稍后重试');
            });
        }

        loadReports(1);
    </script>
</body>
</html>
