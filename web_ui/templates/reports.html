<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试报告列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header a {
            color: #667eea;
            text-decoration: none;
            font-size: 16px;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .report-list {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .report-item {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        .report-item:last-child {
            border-bottom: none;
        }

        .report-item:hover {
            background: #f7fafc;
            transform: translateX(10px);
        }

        .report-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .report-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .empty {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            padding: 20px;
            gap: 10px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
        }

        .pagination-info {
            color: #666;
            font-size: 14px;
            margin: 0 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 测试报告列表</h1>
            <p style="margin-top: 10px;">
                <a href="/">← 返回首页</a>
            </p>
        </div>

        <div class="report-list" id="reportList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const perPage = 10;

        function loadReports(page = 1) {
            fetch(`/api/reports?page=${page}&per_page=${perPage}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        renderReports(data.data);
                        renderPagination(data.pagination);
                    } else {
                        document.getElementById('reportList').innerHTML =
                            `<div class="empty">❌ ${data.message}</div>`;
                    }
                })
                .catch(error => {
                    console.error('加载报告失败:', error);
                    document.getElementById('reportList').innerHTML =
                        '<div class="empty">❌ 加载失败，请刷新重试</div>';
                });
        }

        function renderReports(reports) {
            const container = document.getElementById('reportList');

            if (reports.length === 0) {
                container.innerHTML = '<div class="empty">暂无测试报告</div>';
                return;
            }

            let html = '';
            reports.forEach(report => {
                html += `
                    <div class="report-item">
                        <div class="report-name">📄 ${report.filename}</div>
                        <div class="report-info">
                            文件大小：${formatSize(report.size)} |
                            创建时间：${report.created_time}
                        </div>
                        <a href="/view_report?file=${report.filename}"
                           class="btn btn-primary"
                           target="_blank">
                            👁️ 查看报告
                        </a>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderPagination(pagination) {
            const container = document.getElementById('reportList');

            if (!pagination || pagination.total === 0) {
                return;
            }

            let paginationHtml = `
                <div class="pagination">
                    <button onclick="loadReports(1)" ${!pagination.has_prev ? 'disabled' : ''}>
                        ⏮ 首页
                    </button>
                    <button onclick="loadReports(${pagination.page - 1})" ${!pagination.has_prev ? 'disabled' : ''}>
                        ◀ 上一页
                    </button>
                    <span class="pagination-info">
                        第 ${pagination.page} / ${pagination.total_pages} 页，共 ${pagination.total} 条
                    </span>
                    <button onclick="loadReports(${pagination.page + 1})" ${!pagination.has_next ? 'disabled' : ''}>
                        下一页 ▶
                    </button>
                    <button onclick="loadReports(${pagination.total_pages})" ${!pagination.has_next ? 'disabled' : ''}>
                        末页 ⏭
                    </button>
                </div>
            `;

            container.innerHTML += paginationHtml;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        loadReports(1);
    </script>
</body>
</html>
