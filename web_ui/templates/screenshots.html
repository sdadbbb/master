<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>截图列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header a {
            color: #667eea;
            text-decoration: none;
            font-size: 16px;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .screenshot-item {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .screenshot-item:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .screenshot-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f7fafc;
        }

        .screenshot-info {
            padding: 15px;
            background: white;
        }

        .screenshot-name {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .screenshot-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .btn {
            padding: 6px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            background: #667eea;
            color: white;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 18px;
        }

        .empty {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 18px;
        }

        .pagination {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            padding: 20px;
            gap: 10px;
            border-top: 2px solid #e0e0e0;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
        }

        .pagination-info {
            color: #666;
            font-size: 14px;
            margin: 0 15px;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            margin-top: 2%;
            animation: zoomIn 0.3s;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .close:hover {
            color: #bbb;
        }

        .modal-caption {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 700px;
            text-align: center;
            color: #ccc;
            padding: 10px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 截图列表</h1>
            <p style="margin-top: 10px;">
                <a href="/">← 返回首页</a>
            </p>
        </div>

        <div class="screenshot-grid" id="screenshotGrid">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <!-- 图片查看模态框 -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
        <div class="modal-caption" id="modalCaption"></div>
    </div>

    <script>
        let currentPage = 1;
        const perPage = 12;

        function loadScreenshots(page = 1) {
            fetch(`/api/screenshots?page=${page}&per_page=${perPage}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        renderScreenshots(data.data);
                        renderPagination(data.pagination);
                    } else {
                        document.getElementById('screenshotGrid').innerHTML =
                            `<div class="empty">❌ ${data.message}</div>`;
                    }
                })
                .catch(error => {
                    console.error('加载截图失败:', error);
                    document.getElementById('screenshotGrid').innerHTML =
                        '<div class="empty">❌ 加载失败，请刷新重试</div>';
                });
        }

        function renderScreenshots(screenshots) {
            const container = document.getElementById('screenshotGrid');

            if (screenshots.length === 0) {
                container.innerHTML = '<div class="empty">暂无截图</div>';
                return;
            }

            let html = '';
            screenshots.forEach(screenshot => {
                html += `
                    <div class="screenshot-item" onclick="openModal('${screenshot.filename}')">
                        <img src="/view_screenshot?file=${screenshot.filename}" 
                             class="screenshot-thumbnail" 
                             alt="${screenshot.filename}">
                        <div class="screenshot-info">
                            <div class="screenshot-name">${screenshot.filename}</div>
                            <div class="screenshot-meta">
                                文件大小：${formatSize(screenshot.size)} |
                                创建时间：${screenshot.created_time}
                            </div>
                            <button class="btn" onclick="event.stopPropagation(); openModal('${screenshot.filename}')">
                                🔍 查看大图
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderPagination(pagination) {
            const container = document.getElementById('screenshotGrid');

            if (!pagination || pagination.total === 0) {
                return;
            }

            let paginationHtml = `
                <div class="pagination">
                    <button onclick="loadScreenshots(1)" ${!pagination.has_prev ? 'disabled' : ''}>
                        ⏮ 首页
                    </button>
                    <button onclick="loadScreenshots(${pagination.page - 1})" ${!pagination.has_prev ? 'disabled' : ''}>
                        ◀ 上一页
                    </button>
                    <span class="pagination-info">
                        第 ${pagination.page} / ${pagination.total_pages} 页，共 ${pagination.total} 条
                    </span>
                    <button onclick="loadScreenshots(${pagination.page + 1})" ${!pagination.has_next ? 'disabled' : ''}>
                        下一页 ▶
                    </button>
                    <button onclick="loadScreenshots(${pagination.total_pages})" ${!pagination.has_next ? 'disabled' : ''}>
                        末页 ⏭
                    </button>
                </div>
            `;

            container.innerHTML += paginationHtml;
        }

        function openModal(filename) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const caption = document.getElementById('modalCaption');
            
            modal.style.display = 'block';
            modalImg.src = `/view_screenshot?file=${filename}`;
            caption.textContent = filename;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        loadScreenshots(1);
    </script>
</body>
</html>
